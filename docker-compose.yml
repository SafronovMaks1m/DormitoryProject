services:
  # База данных
  db:
    image: postgres:15
    container_name: postgres_db
    environment:
      POSTGRES_USER: ${NAME_USER:-guest}
      POSTGRES_PASSWORD: ${PASSWORD_USER_DB:-guest}
      POSTGRES_DB: ${NAME_DB:-project_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${NAME_USER:-guest} -d ${NAME_DB:-project_db}"]
      interval: 5s
      timeout: 5s
      retries: 5
  migrations:
    build:
      context: .
      dockerfile: src/Dockerfile
    env_file:
      - .env
    command: alembic upgrade head
    depends_on:
      db:
        condition: service_healthy # Ждем, пока база станет "здоровой"
    restart: on-failure

  # Брокер сообщений
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq_broker
    ports:
      - "5672:5672"
      - "15672:15672"

  # Redis для уведомлений
  redis:
    image: redis:7
    container_name: redis_storage
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"

  # FastAPI приложение
  web:
    build:
      context: .
      dockerfile: src/Dockerfile
    env_file:
      - .env
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000
    volumes:
      - .:/usr/src/app
    ports:
      - "8000:8000"
    depends_on:
      migrations:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_started
      redis:
        condition: service_started

  # Celery Worker для уведомлений (Notifications)
  worker_notify:
    build:
      context: .
      dockerfile: src/Dockerfile
    env_file:
      - .env
    command: celery -A src.celery.init_celery worker -Q notifications -c 4 -l info -n worker_notify@%h
    depends_on:
      migrations:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_started
      redis:
        condition: service_started

  # Celery Worker для сообщений (Messages)
  worker_msg:
    build:
      context: .
      dockerfile: src/Dockerfile
    env_file:
      - .env
    command: celery -A src.celery.init_celery worker -Q messages -c 2 -l info -n worker_msg@%h
    depends_on:
      migrations:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_started
  # Celery Beat (Планировщик)
  celery_beat:
    build:
      context: .
      dockerfile: src/Dockerfile
    env_file:
      - .env
    command: celery -A src.celery.init_celery beat -l info
    depends_on:
      migrations:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_started
      redis:
        condition: service_started

volumes:
  postgres_data:
  redis_data: